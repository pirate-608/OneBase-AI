name: Publish to PyPI

# 触发条件：只有在推送带有 "v" 前缀的 Tag 时（例如 v0.1.0, v1.0.0-beta）才触发
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # 我们需要配置 PyPI 的 Trusted Publishing (无需密码的 OIDC 认证)
    # 这比以前在 GitHub Secrets 里塞一个长长的 Token 要安全得多
    permissions:
      id-token: write  # 允许与 PyPI 进行 OIDC 认证
      contents: read   # 允许读取仓库代码

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 升级打包基础工具
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: 编译构建 wheel 和 sdist 包
        run: python -m build
        
      # 这是一个可选的安全检查，看看打包出来的内容是不是包含了 templates
      - name: 检查打包产物
        run: ls -l dist/

      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # 默认情况下，这个 action 会自动使用 OIDC 认证
        # 无需手动配置任何 API Token 变量！