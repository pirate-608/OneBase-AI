name: Publish to PyPI and Docker Hub

on:
  push:
    tags:
      - 'v*' # 只有推送 v 打头的 tag 时才触发 (例如 v0.1.0)

jobs:
  publish-pypi:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    
    # 配置 OIDC 权限（Trusted Publishing 必须）
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ==========================================
      # 1. 构建前端
      # ==========================================
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Vue Frontend
        run: |
          cd templates/frontend
          npm install
          npm run build
          
          # 🌟 关键操作：将编译好的前端文件直接复制到后端的 static 目录中
          # 这样 Docker 打包时就能直接将其包含在内
          cd ../..
          mkdir -p templates/backend/static
          cp -r templates/frontend/dist/* templates/backend/static/
  
      # ==========================================
      # 2. 打包并发布 Python 包到 PyPI
      # ==========================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build Python package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # ==========================================
      # 3. 构建并发布镜像到 Docker Hub
      # ==========================================

  publish-docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Vue Frontend
        run: |
          cd templates/frontend
          npm install
          npm run build
          
          # 🌟 关键操作：将编译好的前端文件直接复制到后端的 static 目录中
          # 这样 Docker 打包时就能直接将其包含在内
          cd ../..
          mkdir -p templates/backend/static
          cp -r templates/frontend/dist/* templates/backend/static/
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 这个插件会自动根据你的 Git Tag (比如 v0.1.2) 生成镜像标签
      # 例如：yourname/onebase-ai:0.1.2 和 yourname/onebase-ai:latest
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: pirate-608/onebase-ai

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # 告诉 Docker 从 backend 目录读取 Dockerfile 进行打包
          context: ./templates/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}